<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><script src="/assets/theme.js"></script><link rel="icon" href="/assets/nxtcloud-logo.png?v=2"><title>수업별 콘텐츠 · AI 콘텐츠 갤러리</title>
<style>:root{color-scheme:dark;--bg:#090a12;--line:#30344f;--text:#f4f6ff;--muted:#9ca3bd;--cyan:#00d2ff}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at 50% -20%,#242a55,var(--bg) 48%);color:var(--text);font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace}main{width:min(1050px,90vw);margin:auto;padding:calc(var(--sp-8) + var(--sp-3)) 0 calc(var(--sp-8) + var(--sp-8) + var(--sp-4))}.back{display:inline-flex;align-items:center;min-height:44px;padding:var(--sp-2) 0;color:var(--muted);text-decoration:none}.back:hover{color:var(--cyan)}header{padding:calc(var(--sp-6) + var(--sp-6)) 0 calc(var(--sp-8) + var(--sp-1))}h1{margin:var(--sp-3) 0;font-size:clamp(30px,6vw,56px);letter-spacing:-.06em;overflow-wrap:anywhere}header p{color:var(--muted)}#filters{display:flex;gap:var(--sp-2);overflow-x:auto;padding-bottom:var(--sp-6)}.filter{flex:none;padding:var(--sp-3) var(--sp-4);border:1px solid var(--line);background:#10121f;color:var(--muted);font:inherit;cursor:pointer}.filter:hover,.filter[aria-pressed=true]{border-color:var(--cyan);color:var(--text)}#gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:var(--sp-4)}.game-card{position:relative;min-height:185px;display:flex;flex-direction:column;justify-content:space-between;padding:var(--sp-6);border:1px solid var(--line);background:#15182c;text-decoration:none;color:inherit}.game-card:after{content:'↗';position:absolute;right:var(--sp-4);bottom:var(--sp-3);color:var(--cyan);font-size:20px}.game-card:hover{border-color:var(--cyan)}.label{color:var(--cyan);font-size:12px}.game-card h2{margin:var(--sp-2) 0 var(--sp-1);overflow-wrap:anywhere}.category{color:var(--muted)}time{color:#737b98;font-size:12px}.state{grid-column:1/-1;padding:calc(var(--sp-6) + var(--sp-6)) var(--sp-6);border:1px dashed var(--line);color:var(--muted);text-align:center}.error{color:#ff9aae}</style><link rel="stylesheet" href="/assets/theme.css"></head>
<body><span class="grid-twinkles" aria-hidden="true"><i></i><i></i><i></i><i></i><i></i><i></i><i></i></span><nav class="site-nav"><a class="site-brand" href="/"><img class="brand-logo" src="/assets/nxtcloud-logo.png?v=2" alt="NXT Cloud"><span class="site-brand-label">AI CONTENT GALLERY</span></a><div class="site-tools"><button class="theme-toggle" type="button" data-theme-toggle>🌙 다크</button></div></nav><main><header><p>COHORT COLLECTION</p><h1 id="cohortName">수업 콘텐츠</h1><p id="summary">콘텐츠를 불러오는 중...</p><a class="back" href="/">← 갤러리로 돌아가기</a></header><div id="filters" aria-label="콘텐츠 분류 필터"></div><div id="gallery" aria-live="polite"><div class="state">콘텐츠를 불러오는 중...</div></div></main>
<script>
const gallery=document.getElementById('gallery'),filters=document.getElementById('filters'),cohortName=document.getElementById('cohortName'),summary=document.getElementById('summary');const cohort=new URLSearchParams(location.search).get('c')||'';let activeCategory='전체';cohortName.textContent=cohort||'알 수 없는 수업';
function formatDate(value){const date=new Date(value);return Number.isNaN(date.getTime())?'업로드 시각 알 수 없음':new Intl.DateTimeFormat('ko-KR',{dateStyle:'medium',timeStyle:'short'}).format(date)}
function renderGames(games){gallery.replaceChildren();summary.textContent=`${games.length}개의 콘텐츠`;if(!games.length){const empty=document.createElement('div');empty.className='state';empty.textContent='이 수업에는 해당 콘텐츠가 아직 없어요.';gallery.append(empty);return}games.forEach(game=>{const card=document.createElement('a');card.className='game-card';card.href=`view.html?id=${game.contentId}`;const top=document.createElement('div'),label=document.createElement('span'),title=document.createElement('h2'),owner=document.createElement('p'),cardMeta=document.createElement('div'),category=document.createElement('span'),likes=document.createElement('span'),time=document.createElement('time');label.className='label';label.textContent=`OPEN CONTENT · v${game.latestVersion}`;title.textContent=game.title||game.name;owner.className='meta';owner.textContent=`${game.name} · ${game.affiliation}`;cardMeta.className='card-meta';category.className='category';category.textContent=game.category;likes.className='card-likes';likes.textContent=`♥ ${game.likes}`;cardMeta.append(category,likes);time.dateTime=game.updatedAt;time.textContent=formatDate(game.updatedAt);top.append(label,title,owner,cardMeta);card.append(top,time);gallery.append(card)})}
async function loadGames(){const params=new URLSearchParams({cohort});if(activeCategory!=='전체')params.set('category',activeCategory);const response=await fetch(`/api/games?${params}`);if(!response.ok)throw new Error();renderGames((await response.json()).games)}
function renderFilters(categories){filters.replaceChildren();['전체',...categories.slice().reverse()].forEach(value=>{const button=document.createElement('button');button.className='filter';button.type='button';button.textContent=value;button.setAttribute('aria-pressed',String(value===activeCategory));button.addEventListener('click',async()=>{activeCategory=value;filters.querySelectorAll('button').forEach(item=>item.setAttribute('aria-pressed',String(item===button)));try{await loadGames()}catch{renderError()}});filters.append(button)})}
function renderError(){gallery.innerHTML='<div class="state error">콘텐츠를 불러오지 못했어요.</div>';summary.textContent=''}
async function init(){try{const responses=await Promise.all([fetch('/api/cohorts'),fetch('/api/categories')]);if(responses.some(response=>!response.ok))throw new Error();const [cohortData,categoryData]=await Promise.all(responses.map(response=>response.json()));renderFilters(categoryData.categories);if(!cohortData.cohorts.some(item=>item.name===cohort)){renderGames([]);summary.textContent='등록된 수업을 찾을 수 없습니다.';return}await loadGames()}catch{renderError()}}
init();
</script></body></html>
