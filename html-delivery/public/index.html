<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="/assets/theme.js"></script>
<link rel="icon" href="/assets/nxtcloud-logo.png?v=2">
<title>AI 콘텐츠 갤러리</title>
<style>
:root{color-scheme:dark;--bg:#090a12;--panel:#141629;--line:#30344f;--text:#f4f6ff;--muted:#9ca3bd;--cyan:#00d2ff;--pink:#e94560}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at 50% -20%,#242a55 0,var(--bg) 48%);color:var(--text);font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace}a{color:inherit}nav{position:sticky;top:0;z-index:10;display:flex;align-items:center;justify-content:space-between;gap:var(--sp-4);padding:var(--sp-4) max(5vw,var(--sp-6));border-bottom:1px solid #ffffff1a;background:#090a12e0;backdrop-filter:blur(14px)}.brand{font-weight:800;text-decoration:none}.brand-mark,.card-label{color:var(--cyan)}.upload-link{padding:var(--sp-3) var(--sp-4);background:var(--pink);font-weight:700;text-decoration:none;box-shadow:4px 4px 0 #741f37}main{width:min(1120px,90vw);margin:auto;padding:calc(var(--sp-8) + var(--sp-8)) 0 calc(var(--sp-8) + var(--sp-8) + var(--sp-8))}.hero{max-width:800px;padding:var(--sp-6) 0 calc(var(--sp-6) + var(--sp-6))}.eyebrow{color:var(--cyan);font-size:13px;font-weight:700;letter-spacing:.12em}h1{margin:var(--sp-4) 0 0;font-size:clamp(38px,7vw,72px);line-height:1.05;letter-spacing:-.07em}.hero>p:last-child{color:var(--muted);font-size:clamp(16px,2vw,19px);line-height:1.8}.section{margin-top:var(--sp-8)}.section-head{display:flex;align-items:end;justify-content:space-between;gap:var(--sp-4);margin-bottom:var(--sp-6)}h2{margin:0;font-size:clamp(24px,4vw,34px)}.count{color:var(--muted);font-size:13px}#filters,.cohort-grid{display:flex;gap:var(--sp-2);overflow-x:auto;padding:var(--sp-1) var(--sp-1) var(--sp-4)}.filter{flex:none;padding:var(--sp-3) var(--sp-4);border:1px solid var(--line);background:#10121f;color:var(--muted);font:inherit;cursor:pointer}.filter:hover,.filter[aria-pressed=true]{border-color:var(--cyan);color:var(--text);background:#122535}.cohort-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:var(--sp-4)}.cohort-card{padding:var(--sp-6);border:1px solid var(--line);background:#111426;text-decoration:none}.cohort-card:hover{border-color:var(--cyan)}.cohort-card strong{display:block;margin-bottom:var(--sp-2);font-size:17px;overflow-wrap:anywhere}.cohort-card span{color:var(--muted)}#gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:var(--sp-4)}.game-card{position:relative;min-height:190px;display:flex;flex-direction:column;justify-content:space-between;padding:var(--sp-6);border:1px solid var(--line);background:linear-gradient(145deg,#1d213df0,#0f111ff5);text-decoration:none;transition:.15s}.game-card:after{content:'↗';position:absolute;right:18px;bottom:14px;color:var(--cyan);font-size:21px}.game-card:hover{border-color:var(--cyan);transform:translateY(-3px)}.card-label{font-size:12px;letter-spacing:.08em}.game-card h3{margin:var(--sp-2) 0 var(--sp-1);font-size:24px;overflow-wrap:anywhere}.meta{margin:0 0 var(--sp-3);color:var(--muted);overflow-wrap:anywhere}.category{display:inline-block;margin-top:0;padding:var(--sp-1) var(--sp-2);border:1px solid #454b6c;color:#cbd1ec;font-size:11px}time{color:#737b98;font-size:12px}.state{grid-column:1/-1;padding:calc(var(--sp-6) + var(--sp-6)) var(--sp-6);border:1px dashed var(--line);color:var(--muted);text-align:center;line-height:1.7}.error{border-color:var(--pink);color:#ff9aae}@media(max-width:560px){nav{padding:var(--sp-3) var(--sp-4)}.brand-label{display:none}main{width:92vw;padding-top:var(--sp-8)}}
.hero-copy span{display:block}.home-tabs{display:flex;gap:var(--sp-2);overflow-x:auto;padding:var(--sp-1)}.home-tab{flex:1;padding:var(--sp-4) var(--sp-6);font-size:16px;font-weight:700;word-break:keep-all}.home-panel[hidden]{display:none}.pagination{display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:var(--sp-2);margin-top:var(--sp-6)}.page-button{min-width:44px;padding-inline:var(--sp-3)}.page-button:disabled{color:var(--muted);cursor:not-allowed}.pagination-ellipsis{display:inline-flex;align-items:center;justify-content:center;min-width:var(--sp-6);color:var(--muted)}
</style>
<link rel="stylesheet" href="/assets/theme.css">
</head>
<body><span class="grid-twinkles" aria-hidden="true"><i></i><i></i><i></i><i></i><i></i><i></i><i></i></span>
<nav class="site-nav"><a class="site-brand" href="/"><img class="brand-logo" src="/assets/nxtcloud-logo.png?v=2" alt="NXT Cloud"><span class="site-brand-label">AI CONTENT GALLERY</span></a><div class="site-tools"><button class="theme-toggle" type="button" data-theme-toggle>🌙 다크</button><a class="upload-link" href="upload.html">내 콘텐츠 업로드</a></div></nav>
<main>
<section class="hero"><p class="eyebrow">BUILT WITH AI · SHARED WITH EVERYONE</p><h1>AI와 함께 만든<br>우리들의 콘텐츠</h1><p class="hero-copy"><span>AI 리터러시 수업에서 수강생들이 자기 AI 에이전트와 협업해 만든 웹페이지와 미니게임입니다.</span><span>카드를 누르면 사이트 안에서 바로 보고, 피드백과 추천을 남길 수 있어요.</span></p></section>
<div class="home-tabs" role="tablist" aria-label="홈 보기"><button id="contentTab" class="filter home-tab" type="button" role="tab" aria-selected="true" aria-controls="contentPanel">콘텐츠 둘러보기</button><button id="classesTab" class="filter home-tab" type="button" role="tab" aria-selected="false" aria-controls="classesPanel">수업별 모아보기</button></div>
<section id="contentPanel" class="section home-panel" role="tabpanel" aria-labelledby="contentTab"><div class="section-head"><h2 id="gallery-title">콘텐츠 둘러보기</h2><span id="gameCount" class="count" aria-live="polite"></span></div><div id="sorts" aria-label="콘텐츠 정렬"><button class="filter" type="button" data-sort="latest" aria-pressed="true">최신순</button><button class="filter" type="button" data-sort="likes" aria-pressed="false">추천순</button></div><div id="filters" aria-label="콘텐츠 분류 필터"></div><div id="gallery" aria-live="polite"><div class="state">콘텐츠를 불러오는 중...</div></div><div id="pagination" class="pagination" role="navigation" aria-label="콘텐츠 페이지"></div></section>
<section id="classesPanel" class="section home-panel" role="tabpanel" aria-labelledby="classesTab" hidden><div class="section-head"><h2 id="cohort-title">수업별 모아보기</h2></div><div id="cohorts" class="cohort-grid"><div class="state">수업 목록을 불러오는 중...</div></div></section>
</main>
<script>
const PAGE_SIZE=10;
const gallery=document.getElementById('gallery');
const filters=document.getElementById('filters');
const sorts=document.getElementById('sorts');
const gameCount=document.getElementById('gameCount');
const cohortGrid=document.getElementById('cohorts');
const pagination=document.getElementById('pagination');
const contentTab=document.getElementById('contentTab');
const classesTab=document.getElementById('classesTab');
const contentPanel=document.getElementById('contentPanel');
const classesPanel=document.getElementById('classesPanel');
let allGames=[];
let activeCategory='전체';
let activeSort='latest';
let activePage=1;

function formatDate(value){const date=new Date(value);return Number.isNaN(date.getTime())?'업로드 시각 알 수 없음':new Intl.DateTimeFormat('ko-KR',{dateStyle:'medium',timeStyle:'short'}).format(date)}
function renderGames(games){gallery.replaceChildren();if(!games.length){const empty=document.createElement('div');empty.className='state';empty.textContent='아직 등록된 콘텐츠가 없어요.';gallery.append(empty);return}games.forEach(game=>{const card=document.createElement('a');card.className='game-card';card.href=`view.html?id=${game.contentId}`;const top=document.createElement('div'),label=document.createElement('span'),title=document.createElement('h3'),meta=document.createElement('p'),cardMeta=document.createElement('div'),category=document.createElement('span'),likes=document.createElement('span'),time=document.createElement('time');label.className='card-label';label.textContent=`OPEN CONTENT · v${game.latestVersion}`;title.textContent=game.title||game.name;meta.className='meta';meta.textContent=(game.title||game.name)===game.name?game.affiliation:`${game.name} · ${game.affiliation}`;cardMeta.className='card-meta';category.className='category';category.textContent=game.category;likes.className='card-likes';likes.textContent=`♥ ${game.likes}`;cardMeta.append(category,likes);time.dateTime=game.updatedAt;time.textContent=formatDate(game.updatedAt);top.append(label,title,meta,cardMeta);card.append(top,time);gallery.append(card)})}
function visibleGames(){return allGames.filter(game=>activeCategory==='전체'||game.category===activeCategory).sort((a,b)=>activeSort==='likes'?((b.likes||0)-(a.likes||0))||String(b.updatedAt||'').localeCompare(String(a.updatedAt||'')):String(b.updatedAt||'').localeCompare(String(a.updatedAt||'')))}
function pageTokens(totalPages){if(totalPages<=7)return Array.from({length:totalPages},(_,index)=>index+1);const pages=new Set([1,totalPages,activePage-1,activePage,activePage+1]);if(activePage<=3){pages.add(2);pages.add(3)}if(activePage>=totalPages-2){pages.add(totalPages-1);pages.add(totalPages-2)}const ordered=[...pages].filter(page=>page>=1&&page<=totalPages).sort((a,b)=>a-b);return ordered.flatMap((page,index)=>index&&page-ordered[index-1]>1?['…',page]:[page])}
function pageButton(label,{page,disabled=false,current=false,ariaLabel}={}){const button=document.createElement('button');button.className='filter page-button';button.type='button';button.textContent=label;button.disabled=disabled;if(ariaLabel)button.setAttribute('aria-label',ariaLabel);if(current)button.setAttribute('aria-current','page');if(!disabled&&!current)button.addEventListener('click',()=>{activePage=page;renderContent()});return button}
function renderPagination(totalItems){pagination.replaceChildren();const totalPages=Math.ceil(totalItems/PAGE_SIZE);if(totalPages<=1)return;pagination.append(pageButton('← 이전',{page:activePage-1,disabled:activePage===1}));pageTokens(totalPages).forEach(token=>{if(token==='…'){const ellipsis=document.createElement('span');ellipsis.className='pagination-ellipsis';ellipsis.textContent=token;ellipsis.setAttribute('aria-hidden','true');pagination.append(ellipsis);return}pagination.append(pageButton(String(token),{page:token,current:token===activePage,ariaLabel:`${token}페이지`}))});pagination.append(pageButton('다음 →',{page:activePage+1,disabled:activePage===totalPages}))}
function renderContent(){const games=visibleGames();const totalPages=Math.max(1,Math.ceil(games.length/PAGE_SIZE));activePage=Math.min(activePage,totalPages);gameCount.textContent=`${games.length}개의 콘텐츠`;const start=(activePage-1)*PAGE_SIZE;renderGames(games.slice(start,start+PAGE_SIZE));renderPagination(games.length)}
function renderFilters(categories){filters.replaceChildren();['전체',...categories.slice().reverse()].forEach(value=>{const button=document.createElement('button');button.className='filter';button.type='button';button.textContent=value;button.setAttribute('aria-pressed',String(value===activeCategory));button.addEventListener('click',()=>{activeCategory=value;activePage=1;filters.querySelectorAll('button').forEach(item=>item.setAttribute('aria-pressed',String(item===button)));renderContent()});filters.append(button)})}
function renderCohorts(cohorts,games){cohortGrid.replaceChildren();cohorts.forEach(cohort=>{const card=document.createElement('a');card.className='cohort-card';card.href=`cohort.html?c=${encodeURIComponent(cohort.name)}`;const title=document.createElement('strong'),count=document.createElement('span');title.textContent=cohort.name;count.textContent=`${games.filter(game=>game.affiliation===cohort.name).length}개의 콘텐츠`;card.append(title,count);cohortGrid.append(card)})}
function renderError(){gallery.replaceChildren();pagination.replaceChildren();const error=document.createElement('div');error.className='state error';error.textContent='콘텐츠를 불러오지 못했어요. 잠시 후 새로고침해 주세요.';gallery.append(error);gameCount.textContent=''}
function homeView(){return location.hash==='#classes'?'classes':'content'}
function renderHomeView(){const classesActive=homeView()==='classes';contentTab.setAttribute('aria-selected',String(!classesActive));classesTab.setAttribute('aria-selected',String(classesActive));contentTab.tabIndex=classesActive?-1:0;classesTab.tabIndex=classesActive?0:-1;contentPanel.hidden=classesActive;classesPanel.hidden=!classesActive}
function activateHomeView(view){if(homeView()===view)return;const scrollTop=window.scrollY;history.pushState(null,'',view==='classes'?'#classes':`${location.pathname}${location.search}`);renderHomeView();requestAnimationFrame(()=>window.scrollTo(0,scrollTop))}
contentTab.addEventListener('click',()=>activateHomeView('content'));
classesTab.addEventListener('click',()=>activateHomeView('classes'));
[contentTab,classesTab].forEach(tab=>tab.addEventListener('keydown',event=>{if(!['ArrowLeft','ArrowRight'].includes(event.key))return;event.preventDefault();const target=tab===contentTab?classesTab:contentTab;activateHomeView(target===classesTab?'classes':'content');target.focus()}));
window.addEventListener('popstate',renderHomeView);
window.addEventListener('hashchange',renderHomeView);
sorts.addEventListener('click',event=>{const button=event.target.closest('[data-sort]');if(!button)return;activeSort=button.dataset.sort;activePage=1;sorts.querySelectorAll('button').forEach(item=>item.setAttribute('aria-pressed',String(item===button)));renderContent()});
async function init(){renderHomeView();try{const responses=await Promise.all([fetch('/api/cohorts'),fetch('/api/categories'),fetch('/api/games')]);if(responses.some(response=>!response.ok))throw new Error();const [cohortData,categoryData,gameData]=await Promise.all(responses.map(response=>response.json()));allGames=gameData.games;renderFilters(categoryData.categories);renderCohorts(cohortData.cohorts,allGames);renderContent()}catch{cohortGrid.replaceChildren();renderError()}}
init();
</script>
</body></html>
