<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTML 게임 배포</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #111; color: #fff; font-family: monospace; }
  main { width: min(92vw, 520px); padding: 32px; border: 2px solid #444; background: #1a1a2e; }
  h1 { margin-top: 0; color: #00d2ff; }
  p { color: #aaa; line-height: 1.6; }
  label { display: block; margin: 18px 0 6px; color: #fff; }
  input { width: 100%; padding: 11px; border: 1px solid #555; background: #111; color: #fff; font: inherit; }
  button { margin-top: 22px; padding: 12px 24px; border: 0; background: #e94560; color: #fff; cursor: pointer; font: inherit; }
  button:hover { background: #ff6b81; }
  #result { margin-top: 24px; padding: 16px; border: 1px solid #00d2ff; overflow-wrap: anywhere; }
  #result a { color: #00d2ff; }
  [hidden] { display: none; }
  .error { color: #ff6b81; }
</style>
</head>
<body>
<main>
  <h1>HTML 게임 배포</h1>
  <p>소속과 이름을 입력하고, 직접 만든 HTML 게임을 업로드하세요.</p>
  <form id="uploadForm">
    <label for="affiliation">소속</label>
    <input id="affiliation" name="affiliation" maxlength="40" required>
    <label for="name">이름</label>
    <input id="name" name="name" maxlength="40" required>
    <label for="file">HTML 파일</label>
    <input id="file" name="file" type="file" accept=".html,text/html" required>
    <button type="submit">업로드하고 URL 받기</button>
  </form>
  <div id="result" hidden></div>
</main>
<script>
const form = document.getElementById('uploadForm');
const result = document.getElementById('result');
form.addEventListener('submit', async (event) => {
  event.preventDefault();
  result.hidden = false;
  result.className = '';
  result.textContent = '업로드 중...';
  try {
    const response = await fetch('/api/upload', { method: 'POST', body: new FormData(form) });
    const data = await response.json();
    if (!response.ok) throw new Error(data.error || '업로드에 실패했습니다.');
    result.innerHTML = `배포 완료: <a href="${data.url}" target="_blank" rel="noopener">${data.url}</a>
      <button type="button" id="copyButton">URL 복사</button>`;
    document.getElementById('copyButton').addEventListener('click', () => navigator.clipboard.writeText(data.url));
  } catch (error) {
    result.className = 'error';
    result.textContent = error.message;
  }
});
</script>
</body>
</html>
