<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 게임 갤러리</title>
<style>
  :root { color-scheme: dark; --bg: #090a12; --panel: #141629; --line: #30344f; --text: #f4f6ff; --muted: #9ca3bd; --cyan: #00d2ff; --pink: #e94560; }
  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body { margin: 0; min-height: 100vh; background: radial-gradient(circle at 50% -20%, #242a55 0, var(--bg) 48%); color: var(--text); font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
  a { color: inherit; }
  nav { position: sticky; top: 0; z-index: 10; display: flex; align-items: center; justify-content: space-between; gap: 20px; padding: 16px max(5vw, 20px); border-bottom: 1px solid rgba(255,255,255,.1); background: rgba(9,10,18,.88); backdrop-filter: blur(14px); }
  .brand { display: flex; align-items: center; gap: 10px; font-weight: 800; text-decoration: none; letter-spacing: -.03em; }
  .brand-mark { color: var(--cyan); }
  .upload-link { padding: 11px 16px; border: 1px solid var(--pink); background: var(--pink); color: #fff; font-weight: 700; text-decoration: none; box-shadow: 4px 4px 0 #741f37; transition: transform .15s, box-shadow .15s; }
  .upload-link:hover { transform: translate(2px, 2px); box-shadow: 2px 2px 0 #741f37; }
  main { width: min(1120px, 90vw); margin: 0 auto; padding: 72px 0 88px; }
  .hero { max-width: 800px; padding: 24px 0 56px; }
  .eyebrow { margin: 0 0 15px; color: var(--cyan); font-size: 13px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; }
  h1 { margin: 0; max-width: 760px; font-size: clamp(38px, 7vw, 72px); line-height: 1.05; letter-spacing: -.07em; }
  .hero p { margin: 24px 0 0; max-width: 690px; color: var(--muted); font-size: clamp(16px, 2vw, 19px); line-height: 1.8; }
  .section-head { display: flex; align-items: end; justify-content: space-between; gap: 16px; margin-bottom: 22px; }
  h2 { margin: 0; font-size: clamp(24px, 4vw, 34px); letter-spacing: -.04em; }
  #gameCount { color: var(--muted); font-size: 13px; }
  #filters { display: flex; gap: 8px; overflow-x: auto; padding: 2px 2px 18px; scrollbar-width: thin; }
  .filter { flex: 0 0 auto; padding: 9px 13px; border: 1px solid var(--line); background: #10121f; color: var(--muted); font: inherit; cursor: pointer; }
  .filter:hover, .filter[aria-pressed="true"] { border-color: var(--cyan); color: var(--text); background: #122535; }
  #gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 18px; }
  .game-card { position: relative; min-height: 190px; display: flex; flex-direction: column; justify-content: space-between; padding: 22px; border: 1px solid var(--line); background: linear-gradient(145deg, rgba(29,33,61,.94), rgba(15,17,31,.96)); text-decoration: none; overflow: hidden; transition: border-color .15s, transform .15s; }
  .game-card::after { content: "↗"; position: absolute; right: 18px; bottom: 14px; color: var(--cyan); font-size: 21px; }
  .game-card:hover { border-color: var(--cyan); transform: translateY(-3px); }
  .card-label { color: var(--cyan); font-size: 12px; letter-spacing: .08em; }
  .game-card h3 { margin: 16px 0 8px; font-size: 24px; overflow-wrap: anywhere; }
  .cohort { margin: 0; color: var(--muted); overflow-wrap: anywhere; }
  time { color: #737b98; font-size: 12px; }
  .state { grid-column: 1 / -1; padding: 52px 24px; border: 1px dashed var(--line); color: var(--muted); text-align: center; line-height: 1.7; }
  .state strong { display: block; margin-bottom: 8px; color: var(--text); font-size: 18px; }
  .state.error { border-color: var(--pink); color: #ff9aae; }
  @media (max-width: 560px) { nav { padding: 13px 16px; } .brand span:last-child { display: none; } .upload-link { padding: 10px 12px; } main { width: min(92vw, 1120px); padding-top: 42px; } .hero { padding-bottom: 42px; } }
</style>
</head>
<body>
<nav aria-label="주요 메뉴">
  <a class="brand" href="/"><span class="brand-mark">&lt;/&gt;</span><span>AI GAME GALLERY</span></a>
  <a class="upload-link" href="upload.html">내 게임 업로드</a>
</nav>
<main>
  <section class="hero" aria-labelledby="hero-title">
    <p class="eyebrow">Built with AI · Played by everyone</p>
    <h1 id="hero-title">AI와 함께 만든<br>우리들의 게임</h1>
    <p>AI 리터러시 수업에서 수강생들이 자기 AI 에이전트와 협업해 만든 게임 갤러리입니다. 마음에 드는 카드를 누르면 새 창에서 바로 플레이할 수 있어요.</p>
  </section>
  <section aria-labelledby="gallery-title">
    <div class="section-head">
      <h2 id="gallery-title">게임 둘러보기</h2>
      <span id="gameCount" aria-live="polite"></span>
    </div>
    <div id="filters" aria-label="코호트 필터"></div>
    <div id="gallery" aria-live="polite"><div class="state">게임 목록을 불러오는 중...</div></div>
  </section>
</main>
<script>
const gallery = document.getElementById('gallery');
const filters = document.getElementById('filters');
const gameCount = document.getElementById('gameCount');
let games = [];
let activeCohort = '전체';

function formatDate(value) {
  const date = new Date(value);
  if (Number.isNaN(date.getTime())) return '업로드 시각 알 수 없음';
  return new Intl.DateTimeFormat('ko-KR', { dateStyle: 'medium', timeStyle: 'short' }).format(date);
}

function renderGames() {
  const visible = activeCohort === '전체' ? games : games.filter((game) => game.affiliation === activeCohort);
  gallery.replaceChildren();
  gameCount.textContent = `${visible.length}개의 게임`;
  if (!visible.length) {
    const empty = document.createElement('div');
    empty.className = 'state';
    const title = document.createElement('strong');
    title.textContent = '아직 업로드된 게임이 없어요. 첫 번째 주인공이 되어 보세요!';
    empty.append(title);
    gallery.append(empty);
    return;
  }
  visible.forEach((game) => {
    const card = document.createElement('a');
    card.className = 'game-card';
    card.href = game.url;
    card.target = '_blank';
    card.rel = 'noopener';
    const top = document.createElement('div');
    const label = document.createElement('span');
    label.className = 'card-label';
    label.textContent = 'PLAY GAME';
    const title = document.createElement('h3');
    title.textContent = game.name;
    const cohort = document.createElement('p');
    cohort.className = 'cohort';
    cohort.textContent = game.affiliation;
    top.append(label, title, cohort);
    const time = document.createElement('time');
    time.dateTime = game.uploadedAt;
    time.textContent = formatDate(game.uploadedAt);
    card.append(top, time);
    gallery.append(card);
  });
}

function renderFilters(cohorts) {
  filters.replaceChildren();
  ['전체', ...cohorts].forEach((cohort) => {
    const button = document.createElement('button');
    button.className = 'filter';
    button.type = 'button';
    button.textContent = cohort;
    button.setAttribute('aria-pressed', String(cohort === activeCohort));
    button.addEventListener('click', () => {
      activeCohort = cohort;
      filters.querySelectorAll('button').forEach((item) => item.setAttribute('aria-pressed', String(item === button)));
      renderGames();
    });
    filters.append(button);
  });
}

async function loadGallery() {
  try {
    const [cohortResponse, gamesResponse] = await Promise.all([fetch('/api/cohorts'), fetch('/api/games')]);
    if (!cohortResponse.ok || !gamesResponse.ok) throw new Error('목록 요청 실패');
    const cohortData = await cohortResponse.json();
    const gamesData = await gamesResponse.json();
    games = gamesData.games;
    renderFilters(cohortData.cohorts);
    renderGames();
  } catch {
    gallery.innerHTML = '<div class="state error"><strong>게임 목록을 불러오지 못했어요.</strong>잠시 후 새로고침해 주세요.</div>';
    gameCount.textContent = '';
  }
}

loadGallery();
</script>
</body>
</html>
